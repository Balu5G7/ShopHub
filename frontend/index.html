<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopHub - E-Commerce Store</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="#" class="nav-logo" onclick="showPage('home')">
                <i class="fas fa-store"></i> ShopHub
            </a>
            <div class="nav-search">
                <input type="text" id="searchInput" placeholder="Search products..." onkeyup="handleSearch(event)">
                <button onclick="handleSearch()"><i class="fas fa-search"></i></button>
            </div>
            <div class="nav-links">
                <a href="#" onclick="showPage('home')"><i class="fas fa-home"></i> Home</a>
                <a href="#" onclick="showPage('cart')" class="cart-link">
                    <i class="fas fa-shopping-cart"></i> Cart
                    <span id="cartCount" class="cart-badge">0</span>
                </a>
                <a href="#" id="authLink" onclick="showPage('login')"><i class="fas fa-user"></i> Login</a>
            </div>
            <button class="mobile-menu-btn" onclick="toggleMobileMenu()">
                <i class="fas fa-bars"></i>
            </button>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Home Page -->
        <div id="page-home" class="page active">
            <div class="hero">
                <div class="hero-content">
                    <h1>Welcome to ShopHub</h1>
                    <p>Discover amazing products at unbeatable prices</p>
                </div>
            </div>
            <div class="container">
                <div class="category-filters">
                    <button class="category-btn active" onclick="filterByCategory('')">All</button>
                    <div id="categoryList"></div>
                </div>
                <div class="products-grid" id="productsGrid">
                    <div class="loading">Loading products...</div>
                </div>
            </div>
        </div>

        <!-- Product Detail Page -->
        <div id="page-product" class="page">
            <div class="container">
                <button class="back-btn" onclick="showPage('home')"><i class="fas fa-arrow-left"></i> Back to Products</button>
                <div id="productDetail" class="product-detail"></div>
            </div>
        </div>

        <!-- Cart Page -->
        <div id="page-cart" class="page">
            <div class="container">
                <h2 class="page-title"><i class="fas fa-shopping-cart"></i> Shopping Cart</h2>
                <div id="cartContent"></div>
            </div>
        </div>

        <!-- Orders Page -->
        <div id="page-orders" class="page">
            <div class="container">
                <h2 class="page-title"><i class="fas fa-box"></i> My Orders</h2>
                <div id="ordersContent"></div>
            </div>
        </div>

        <!-- Login Page -->
        <div id="page-login" class="page">
            <div class="container">
                <div class="auth-container">
                    <div class="auth-form">
                        <h2 id="authTitle">Login</h2>
                        <div id="authError" class="auth-error"></div>
                        <div class="form-group">
                            <label for="authName">Full Name</label>
                            <input type="text" id="authName" placeholder="Enter your name">
                        </div>
                        <div class="form-group">
                            <label for="authEmail">Email</label>
                            <input type="email" id="authEmail" placeholder="Enter your email">
                        </div>
                        <div class="form-group">
                            <label for="authPassword">Password</label>
                            <input type="password" id="authPassword" placeholder="Enter your password">
                        </div>
                        <button id="authSubmitBtn" class="btn btn-primary" onclick="handleAuth()">Login</button>
                        <p class="auth-toggle">
                            <span id="authToggleText">Don't have an account?</span>
                            <a href="#" id="authToggleLink" onclick="toggleAuthMode()">Register</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Checkout Page -->
        <div id="page-checkout" class="page">
            <div class="container">
                <h2 class="page-title"><i class="fas fa-credit-card"></i> Checkout</h2>
                <div class="checkout-container">
                    <div class="checkout-form">
                        <h3>Shipping Address</h3>
                        <div class="form-group">
                            <label for="shippingAddress">Full Address</label>
                            <textarea id="shippingAddress" rows="3" placeholder="Street, City, State, ZIP Code"></textarea>
                        </div>
                        <button class="btn btn-primary" onclick="placeOrder()">
                            <i class="fas fa-check"></i> Place Order
                        </button>
                    </div>
                    <div class="checkout-summary" id="checkoutSummary"></div>
                </div>
            </div>
        </div>
    </main>

    <!-- Toast Notification -->
    <div id="toast" class="toast"></div>

    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
